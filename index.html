<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnTrack - Módulo Docente</title>
    <style>
        body { margin: 0; font-family: 'Sora', sans-serif; background: #F8F9FA; overflow-x: hidden; }
        #app-viewport { min-height: 100vh; display: flex; flex-direction: column; }
        .loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; display: flex; justify-content: center; 
            align-items: center; z-index: 9999; transition: opacity 0.3s;
        }
        /* Estilo para que las pantallas cargadas ocupen todo el ancho */
        .shell.screen { display: flex !important; width: 100%; padding-top: 0; }
    </style>
</head>
<body>

    <div id="app-viewport">
        <div class="loading-overlay" id="loader">Cargando...</div>
    </div>

    <script>
        /**
         * Diccionario maestro de rutas.
         * Mapea URLs amigables a tus archivos físicos.
         */
        const routes = {
            '/': 'docente-perfil.html',
            '/perfil': 'docente-perfil.html',
            '/estudiantes': 'docente-estudiantes.html',
            '/nueva-actividad': 'docente-nueva-actividad.html',
            '/feynman-review': 'docente-feynman-review.html',
            '/ruta-aprendizaje': 'docente-ruta-aprendizaje.html',
            '/carga-ia': 'docente-carga-ia.html',
            '/creacion-manual': 'docente-creacion-manual.html',
            '/editor-ia': 'docente-editor-ia.html',
            '/modal-alumno': 'docente-modal-alumno.html',
            '/modal-alumno-error': 'docente-modal-alumno-error.html',
            '/modal-grupo': 'docente-modal-grupo.html',
            '/modal-grupo-error': 'docente-modal-grupo-error.html'
        };

        async function router() {
            const viewport = document.getElementById('app-viewport');
            const loader = document.getElementById('loader');
            
            // Obtenemos el path actual (ej: /estudiantes)
            const path = window.location.pathname;
            const fileToLoad = routes[path] || 'docente-perfil.html'; 

            try {
                loader.style.display = 'flex';
                loader.style.opacity = '1';

                const response = await fetch(fileToLoad);
                if (!response.ok) throw new Error('Error al cargar la vista');
                
                const html = await response.text();
                
                // Limpiar el viewport e inyectar el nuevo HTML
                viewport.innerHTML = html;

                // RE-EJECUCIÓN DE SCRIPTS:
                // Esto es vital para que las funciones como show() o validaciones funcionen
                const scripts = viewport.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

            } catch (error) {
                console.error(error);
                viewport.innerHTML = `
                    <div style="padding: 100px 20px; text-align: center; font-family: sans-serif;">
                        <h1 style="font-size: 48px; color: #7C6FF7;">404</h1>
                        <p style="color: #4B5563;">La página <strong>${path}</strong> no pudo ser cargada.</p>
                        <button onclick="navigateTo('/')" style="background: #7C6FF7; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 20px;">
                            Volver al Inicio
                        </button>
                    </div>`;
            } finally {
                // Pequeño delay para suavizar la transición
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 300);
                }, 400);
            }
        }

        // Escuchar el botón "atrás" del navegador
        window.onpopstate = router;
        
        // Carga inicial
        window.addEventListener('DOMContentLoaded', router);

        /**
         * Función global para navegar sin recargar la página entera.
         * Úsala en tus otros HTML así: onclick="navigateTo('/estudiantes')"
         */
        window.navigateTo = function(path) {
            window.history.pushState({}, "", path);
            router();
        };
    </script>
</body>
</html>
